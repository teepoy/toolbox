experiment:
  name: full
  output_dir: outputs/full
  seed: 42

dataset:
  name: nkirschi/oxford-flowers
  train_split: train
  val_split: validation
  test_split: test
  image_key: image
  label_key: label
  train_subset: null
  val_subset: null
  test_subset: null
  val_fraction: 0.1
  test_fraction: 0.1
  num_workers: 4

model:
  backbone_name: convnextv2_atto
  pretrained: true
  allow_random_init_fallback: false
  projection_dim: 256
  projection_hidden_dim: 1024
  normalize_embeddings: true

train:
  image_size: 224
  batch_size: 48
  epochs: 100
  lr: 1.0e-5
  weight_decay: 1.0e-4
  temperature: 0.07
  log_every_steps: 20
  save_every_epochs: 1
  use_amp: true

benchmark:
  batch_size: 64
  knn_k_values: [1, 5]
  reference_split: train
  eval_split: validation
  linear_probe:
    epochs: 100
    lr: 5.0e-3
    weight_decay: 1.0e-4
    batch_size: 128

runtime:
  device: auto
