experiment:
  name: smoke
  output_dir: outputs/smoke
  seed: 42

dataset:
  name: nkirschi/oxford-flowers
  train_split: train
  val_split: validation
  test_split: test
  image_key: image
  label_key: label
  train_subset: 192
  val_subset: 96
  test_subset: 96
  val_fraction: 0.15
  test_fraction: 0.15
  num_workers: 2

model:
  backbone_name: convnextv2_atto
  pretrained: true
  allow_random_init_fallback: true
  projection_dim: 256
  projection_hidden_dim: 512
  normalize_embeddings: true

train:
  image_size: 224
  batch_size: 16
  epochs: 1
  lr: 5.0e-5
  weight_decay: 1.0e-4
  temperature: 0.07
  log_every_steps: 5
  save_every_epochs: 1
  use_amp: true

benchmark:
  batch_size: 32
  knn_k_values: [1, 5]
  linear_probe:
    epochs: 25
    lr: 1.0e-2
    weight_decay: 1.0e-4
    batch_size: 64

runtime:
  device: auto
