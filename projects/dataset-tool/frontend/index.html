<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dataset Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --bg-elevated: #222230;
            --accent-primary: #6366f1;
            --accent-secondary: #818cf8;
            --accent-tertiary: #a5b4fc;
            --accent-glow: rgba(99, 102, 241, 0.3);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #2d2d3d;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --gradient-1: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
            --gradient-2: linear-gradient(135deg, #1a1a25 0%, #12121a 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .app-container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border-color);
            background: rgba(18, 18, 26, 0.8);
            backdrop-filter: blur(20px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--gradient-1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .logo-text {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
        }

        .btn {
            padding: 0.625rem 1.25rem;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 2px 10px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: var(--bg-elevated);
            border-color: var(--accent-primary);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .btn-sm {
            padding: 0.4rem 0.75rem;
            font-size: 0.8rem;
        }

        main {
            flex: 1;
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
        }

        .datasets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        .dataset-card {
            background: var(--gradient-2);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .dataset-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-1);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .dataset-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3), 0 0 0 1px var(--accent-glow);
        }

        .dataset-card:hover::before {
            opacity: 1;
        }

        .dataset-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .dataset-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .dataset-description {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.4;
        }

        .dataset-meta {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .meta-item svg {
            width: 14px;
            height: 14px;
            opacity: 0.7;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 1.5rem;
            opacity: 0.3;
        }

        .empty-state h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            overflow: hidden;
            transform: scale(0.95) translateY(20px);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-tertiary);
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .modal-close:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
            max-height: calc(85vh - 140px);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        textarea.form-input {
            resize: vertical;
            min-height: 80px;
        }

        .columns-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .column-tag {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.75rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 0.8rem;
        }

        .column-tag button {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .column-tag button:hover {
            color: var(--error);
        }

        .data-table-container {
            overflow-x: auto;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            margin-top: 1rem;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .data-table th {
            background: var(--bg-tertiary);
            padding: 0.875rem 1rem;
            text-align: left;
            font-weight: 600;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            white-space: nowrap;
        }

        .data-table td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border-color);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
        }

        .data-table tr:hover td {
            background: var(--bg-tertiary);
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .cell-input {
            background: transparent;
            border: 1px solid transparent;
            border-radius: 4px;
            padding: 0.25rem 0.5rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: inherit;
            width: 100%;
            min-width: 100px;
        }

        .cell-input:hover {
            border-color: var(--border-color);
        }

        .cell-input:focus {
            outline: none;
            border-color: var(--accent-primary);
            background: var(--bg-tertiary);
        }

        .extensions-panel {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 1rem;
            margin-top: 1rem;
        }

        .extensions-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .extension-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .extension-btn {
            padding: 0.5rem 1rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .extension-btn:hover {
            border-color: var(--accent-primary);
            color: var(--accent-tertiary);
        }

        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 2000;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .toast {
            padding: 1rem 1.25rem;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            border-color: var(--success);
        }

        .toast.error {
            border-color: var(--error);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .tabs {
            display: flex;
            gap: 0.25rem;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .tab {
            padding: 0.75rem 1.25rem;
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            position: relative;
            transition: color 0.2s ease;
        }

        .tab:hover {
            color: var(--text-secondary);
        }

        .tab.active {
            color: var(--accent-tertiary);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--accent-primary);
            border-radius: 2px 2px 0 0;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }

            .datasets-grid {
                grid-template-columns: 1fr;
            }

            main {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">D</div>
                    <span class="logo-text">Dataset Tool</span>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="openCreateModal()">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="5" x2="12" y2="19"></line>
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                        </svg>
                        New Dataset
                    </button>
                </div>
            </div>
        </header>

        <main>
            <div id="datasets-container" class="datasets-grid"></div>
            <div id="empty-state" class="empty-state" style="display: none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                </svg>
                <h2>No Datasets Yet</h2>
                <p>Create your first dataset to get started</p>
            </div>
        </main>
    </div>

    <div id="createModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="modal-title">Create Dataset</h2>
                <button class="modal-close" onclick="closeCreateModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <form id="createForm" onsubmit="createDataset(event)">
                    <div class="form-group">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-input" name="name" placeholder="Sales Data Q4" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea class="form-input" name="description" placeholder="Quarterly sales performance data..."></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Columns</label>
                        <div id="columnsList" class="columns-list"></div>
                        <div style="display: flex; gap: 0.5rem; margin-top: 0.75rem;">
                            <input type="text" class="form-input" id="colName" placeholder="Column name" style="flex: 1;">
                            <select id="colType" class="form-input" style="width: 140px;">
                                <option value="string">String</option>
                                <option value="number">Number</option>
                                <option value="boolean">Boolean</option>
                                <option value="date">Date</option>
                            </select>
                            <button type="button" class="btn btn-secondary" onclick="addColumn()">Add</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Sample Data (JSON)</label>
                        <textarea class="form-input" name="data" id="dataInput" rows="8" placeholder='[{"name": "Product A", "sales": 150, "region": "North"}]'></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Create Dataset</button>
                </form>
            </div>
        </div>
    </div>

    <div id="viewModal" class="modal-overlay" onclick="closeModal(event)">
        <div class="modal" style="max-width: 1100px;" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 class="modal-title" id="viewTitle">Dataset</h2>
                <button class="modal-close" onclick="closeViewModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('data')">Data</button>
                    <button class="tab" onclick="switchTab('extensions')">Extensions</button>
                </div>
                <div id="tab-data" class="tab-content active">
                    <div class="data-table-container">
                        <table class="data-table" id="dataTable">
                            <thead id="tableHead"></thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
                <div id="tab-extensions" class="tab-content">
                    <div class="extensions-panel">
                        <div class="extensions-title">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2L2 7l10 5 10-5-10-5z"></path>
                                <path d="M2 17l10 5 10-5"></path>
                                <path d="M2 12l10 5 10-5"></path>
                            </svg>
                            Available Extensions
                        </div>
                        <div class="extension-list" id="extensionList"></div>
                    </div>
                    <div id="extensionParams" class="form-group" style="margin-top: 1rem; display: none;">
                        <label class="form-label">Parameters (JSON)</label>
                        <textarea class="form-input" id="extensionParamsInput" rows="3" placeholder='{"columns": ["sales"]}'></textarea>
                        <button type="button" class="btn btn-primary" style="margin-top: 0.75rem;" onclick="runExtension()">Run Extension</button>
                    </div>
                </div>
                <div style="margin-top: 1.5rem; display: flex; justify-content: space-between;">
                    <button class="btn btn-danger" onclick="deleteDataset()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
                        </svg>
                        Delete Dataset
                    </button>
                    <button class="btn btn-primary" onclick="saveChanges()">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        let currentDataset = null;
        let currentData = [];
        let columns = [];
        let extensions = [];
        let pendingChanges = [];

        async function fetchDatasets() {
            try {
                const res = await fetch(`${API_BASE}/datasets`);
                const datasets = await res.json();
                renderDatasets(datasets);
            } catch (e) {
                showToast('Failed to load datasets', 'error');
            }
        }

        async function fetchExtensions() {
            try {
                const res = await fetch(`${API_BASE}/extensions`);
                extensions = await res.json();
                renderExtensions();
            } catch (e) {
                console.error('Failed to load extensions');
            }
        }

        function renderDatasets(datasets) {
            const container = document.getElementById('datasets-container');
            const emptyState = document.getElementById('empty-state');

            if (datasets.length === 0) {
                container.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            container.innerHTML = datasets.map(ds => `
                <div class="dataset-card" onclick="viewDataset('${ds.id}')">
                    <div class="dataset-header">
                        <div>
                            <div class="dataset-name">${escapeHtml(ds.name)}</div>
                            <div class="dataset-description">${escapeHtml(ds.description || 'No description')}</div>
                        </div>
                    </div>
                    <div class="dataset-meta">
                        <div class="meta-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path>
                            </svg>
                            ${ds.row_count} rows
                        </div>
                        <div class="meta-item">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                                <line x1="3" y1="9" x2="21" y2="9"></line>
                                <line x1="9" y1="21" x2="9" y2="9"></line>
                            </svg>
                            ${ds.columns.length} columns
                        </div>
                    </div>
                </div>
            `).join('');
        }

        async function viewDataset(id) {
            try {
                const res = await fetch(`${API_BASE}/datasets/${id}`);
                const { dataset, data } = await res.json();
                currentDataset = dataset;
                currentData = data;
                columns = dataset.columns;
                pendingChanges = [];

                document.getElementById('viewTitle').textContent = dataset.name;
                renderTable();
                document.getElementById('viewModal').classList.add('active');
            } catch (e) {
                showToast('Failed to load dataset', 'error');
            }
        }

        function renderTable() {
            const thead = document.getElementById('tableHead');
            const tbody = document.getElementById('tableBody');

            thead.innerHTML = `<tr>${columns.map(col => `<th>${escapeHtml(col.name)}<br><small style="color: var(--text-muted)">${col.data_type}</small></th>`).join('')}</tr>`;

            tbody.innerHTML = currentData.map((row, idx) => `
                <tr>
                    ${columns.map(col => `
                        <td>
                            <input type="text" class="cell-input"
                                value="${escapeHtml(String(row[col.name] ?? ''))}"
                                data-row="${idx}"
                                data-col="${col.name}"
                                onchange="markChange(this)">
                        </td>
                    `).join('')}
                </tr>
            `).join('');
        }

        function markChange(input) {
            const rowIdx = parseInt(input.dataset.row);
            const colName = input.dataset.col;

            if (!pendingChanges[rowIdx]) {
                pendingChanges[rowIdx] = {};
            }
            pendingChanges[rowIdx][colName] = input.value;
        }

        async function saveChanges() {
            const updates = Object.entries(pendingChanges)
                .filter(([_, v]) => Object.keys(v).length > 0)
                .map(([idx, changes]) => ({
                    row_index: parseInt(idx),
                    updates: changes
                }));

            if (updates.length === 0) {
                showToast('No changes to save', 'success');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/datasets/${currentDataset.id}/rows`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(updates)
                });

                if (res.ok) {
                    showToast('Changes saved successfully', 'success');
                    pendingChanges = [];
                    viewDataset(currentDataset.id);
                } else {
                    showToast('Failed to save changes', 'error');
                }
            } catch (e) {
                showToast('Failed to save changes', 'error');
            }
        }

        function renderExtensions() {
            const list = document.getElementById('extensionList');
            list.innerHTML = extensions.map(ext => `
                <button class="extension-btn" onclick="selectExtension('${ext}')">${ext}</button>
            `).join('');
        }

        function selectExtension(name) {
            document.getElementById('extensionParams').style.display = 'block';
            document.getElementById('extensionParams').dataset.selected = name;
        }

        async function runExtension() {
            const name = document.getElementById('extensionParams').dataset.selected;
            const paramsInput = document.getElementById('extensionParamsInput').value;
            let params = {};

            try {
                params = JSON.parse(paramsInput || '{}');
            } catch (e) {
                showToast('Invalid JSON in parameters', 'error');
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/datasets/${currentDataset.id}/extensions/${name}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(params)
                });

                const result = await res.json();
                if (result.success) {
                    showToast(`Extension ran: ${result.message}`, 'success');
                    viewDataset(currentDataset.id);
                } else {
                    showToast(`Extension failed: ${result.message}`, 'error');
                }
            } catch (e) {
                showToast('Failed to run extension', 'error');
            }
        }

        async function deleteDataset() {
            if (!confirm('Are you sure you want to delete this dataset?')) return;

            try {
                const res = await fetch(`${API_BASE}/datasets/${currentDataset.id}`, {
                    method: 'DELETE'
                });

                if (res.ok) {
                    showToast('Dataset deleted', 'success');
                    closeViewModal();
                    fetchDatasets();
                } else {
                    showToast('Failed to delete dataset', 'error');
                }
            } catch (e) {
                showToast('Failed to delete dataset', 'error');
            }
        }

        function openCreateModal() {
            columns = [];
            document.getElementById('createForm').reset();
            document.getElementById('columnsList').innerHTML = '';
            document.getElementById('createModal').classList.add('active');
        }

        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('active');
        }

        function closeViewModal() {
            document.getElementById('viewModal').classList.remove('active');
            currentDataset = null;
        }

        function closeModal(e) {
            if (e.target.classList.contains('modal-overlay')) {
                closeCreateModal();
                closeViewModal();
            }
        }

        function addColumn() {
            const name = document.getElementById('colName').value.trim();
            const type = document.getElementById('colType').value;

            if (!name) return;

            columns.push({ name, data_type: type });
            renderColumns();
            document.getElementById('colName').value = '';
        }

        function removeColumn(idx) {
            columns.splice(idx, 1);
            renderColumns();
        }

        function renderColumns() {
            const list = document.getElementById('columnsList');
            list.innerHTML = columns.map((col, idx) => `
                <div class="column-tag">
                    <span>${escapeHtml(col.name)}</span>
                    <small style="color: var(--text-muted)">(${col.data_type})</small>
                    <button type="button" onclick="removeColumn(${idx})">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
            `).join('');
        }

        async function createDataset(e) {
            e.preventDefault();
            const form = e.target;
            const formData = new FormData(form);

            const data = formData.get('data');
            let parsedData = [];

            try {
                parsedData = JSON.parse(data || '[]');
            } catch (e) {
                showToast('Invalid JSON data', 'error');
                return;
            }

            const payload = {
                name: formData.get('name'),
                description: formData.get('description'),
                columns: columns,
                data: parsedData
            };

            try {
                const res = await fetch(`${API_BASE}/datasets`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    showToast('Dataset created', 'success');
                    closeCreateModal();
                    fetchDatasets();
                } else {
                    showToast('Failed to create dataset', 'error');
                }
            } catch (e) {
                showToast('Failed to create dataset', 'error');
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelector(`.tab[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    ${type === 'success'
                        ? '<polyline points="20 6 9 17 4 12"></polyline>'
                        : '<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>'}
                </svg>
                ${escapeHtml(message)}
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        fetchDatasets();
        fetchExtensions();
    </script>
</body>
</html>
